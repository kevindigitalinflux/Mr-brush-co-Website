name = "mr-brush-quote-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# ── Rate limiting binding ─────────────────────────────────────────────────────
# 5 POST requests per IP per 60 seconds
# Enforced at the edge before any Supabase traffic is generated
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"

[unsafe.bindings.simple]
limit = 5
period = 60
